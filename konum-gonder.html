<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Konum Gönder — KREDİZMİR</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1b2a;
      color: #e8f0fe;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 20px 16px 40px;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .back-btn {
      background: #1a2d45;
      border: none;
      color: #4db8ff;
      font-size: 22px;
      width: 40px; height: 40px;
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
    }
    .topbar h2 { font-size: 18px; font-weight: 700; color: #fff; }

    .card {
      background: #1a2d45;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      border: 1px solid #1e3a56;
    }

    .ofis-adi {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ofis-satir {
      font-size: 13px;
      color: #8aaccc;
      line-height: 1.6;
      margin-bottom: 6px;
    }
    .ofis-satir span { color: #e8f0fe; }
    .harita-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      background: rgba(77,184,255,.1);
      border: 1px solid rgba(77,184,255,.25);
      border-radius: 8px;
      padding: 8px 12px;
      color: #4db8ff;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .harita-link:hover { background: rgba(77,184,255,.18); }

    #mapContainer {
      height: 230px;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
      border: 1px solid #1e3a56;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      color: #e67e22;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #8aaccc;
      margin-bottom: 6px;
      margin-top: 14px;
      font-weight: 600;
    }
    label:first-of-type { margin-top: 0; }
    input {
      width: 100%;
      background: #0d1b2a;
      border: 1px solid #1e3a56;
      border-radius: 8px;
      color: #e8f0fe;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      font-family: inherit;
    }
    input:focus { border-color: #e67e22; }

    .wp-btn {
      width: 100%;
      background: #25d366;
      border: none;
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      padding: 15px;
      border-radius: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .wp-btn:active { opacity: .85; }
  </style>
</head>
<body>

  <div class="topbar">
    <a href="index.html" class="back-btn">‹</a>
    <h2>📍 Konum Gönder</h2>
  </div>

  <!-- Sabit Ofis Bilgisi -->
  <div class="card">
    <div class="ofis-adi">🏢 KREDİZMİR Finansal Çözümler</div>
    <div class="ofis-satir">📍 Adres: <span>568. Sk. No:1A, Beyazevler Mah., Gaziemir / İzmir</span></div>
    <a class="harita-link" href="https://maps.google.com/?q=38.34574,27.14309" target="_blank">
      🗺️ Google Maps'te Aç
    </a>
  </div>

  <!-- Leaflet Harita -->
  <div id="mapContainer"></div>

  <!-- Müşteri Bilgileri -->
  <div class="card">
    <p class="section-label">Müşteri Bilgileri</p>
    <label>Müşteri Adı (opsiyonel)</label>
    <input type="text" id="musteriAd" placeholder="Ahmet Yılmaz">
    <label>Müşteri Telefonu (WhatsApp)</label>
    <input type="tel" id="musteriTel" placeholder="05XX XXX XX XX">
    <label>Ek Not (opsiyonel)</label>
    <input type="text" id="musteriNot" placeholder="Sizi bekliyoruz...">
  </div>

  <button class="wp-btn" onclick="wpGonder()">📲 WhatsApp ile Gönder</button>

  <script>
    const OFİS_ADI    = 'KREDİZMİR Finansal Çözümler';
    const OFİS_ADRES  = '568. Sk. No:1A, Beyazevler Mah., Gaziemir / İzmir';
    const OFİS_MAPS   = 'https://maps.google.com/?q=38.34574,27.14309';
    const OFİS_LAT    = 38.34574;
    const OFİS_LNG    = 27.14309;

    // Haritayı sayfa yüklenince göster
    const map = L.map('mapContainer').setView([OFİS_LAT, OFİS_LNG], 16);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap'
    }).addTo(map);
    L.marker([OFİS_LAT, OFİS_LNG])
      .addTo(map)
      .bindPopup('🏢 KREDİZMİR Ofisi')
      .openPopup();

    function formatWaTel(raw) {
      let t = raw.replace(/\D/g, '');
      if (t.startsWith('0')) t = '90' + t.slice(1);
      else if (t.startsWith('5')) t = '90' + t;
      return t;
    }

    function wpGonder() {
      const ad  = document.getElementById('musteriAd').value.trim();
      const tel = document.getElementById('musteriTel').value.trim();
      const not = document.getElementById('musteriNot').value.trim();

      const musteriSatir = ad  ? `Sayın *${ad}*,\n\n` : '';
      const notSatir     = not ? `\n📝 ${not}` : '';

      const mesaj = `${musteriSatir}*KREDİZMİR — Ofis Adresimiz*\n`
        + `━━━━━━━━━━━━━━━━━━\n`
        + `🏢 ${OFİS_ADI}\n`
        + `📍 Adres: ${OFİS_ADRES}\n`
        + `🗺️ Harita: ${OFİS_MAPS}`
        + notSatir
        + `\n━━━━━━━━━━━━━━━━━━\n`
        + `_Sizi ofisimizde bekliyoruz!_`;

      const waUrl = tel
        ? `https://wa.me/${formatWaTel(tel)}?text=${encodeURIComponent(mesaj)}`
        : `https://wa.me/?text=${encodeURIComponent(mesaj)}`;
      window.open(waUrl, '_blank');
    }
  </script>
</body>
</html>
