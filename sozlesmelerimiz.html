<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sözleşmelerimiz — KREDİZMİR</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d1b2a;color:#e8f0fe;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;padding:20px 16px 40px;}
    .page{max-width:900px;margin:0 auto;}
    .header{display:flex;align-items:center;gap:12px;margin-bottom:28px;}
    .back-btn{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#e8f0fe;padding:8px 14px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;}
    .back-btn:hover{background:rgba(255,255,255,.14);}
    .header-title{font-size:20px;font-weight:700;}
    .coming-soon{text-align:center;padding:80px 24px;}
    .coming-soon .icon{font-size:64px;margin-bottom:24px;}
    .coming-soon h2{font-size:22px;font-weight:700;margin-bottom:12px;}
    .coming-soon p{font-size:15px;color:rgba(232,240,254,.6);line-height:1.6;}
  </style>
</head>
<body>
<div class="page">
  <div class="header">
    <a href="index.html" class="back-btn">← Geri</a>
    <span class="header-title">Sözleşmelerimiz</span>
  </div>
  <div class="coming-soon">
    <div class="icon">📄</div>
    <h2>Yakında</h2>
    <p>Sözleşme belgelerimiz burada yayınlanacak.</p>
  </div>
</div>
</body>
</html>
