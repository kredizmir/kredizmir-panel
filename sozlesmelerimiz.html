<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KREDİZMİR – Teklif Oluştur</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#08264A; --gold:#C8A23A; --bg:#F3F4F6;
  --text:#233142; --sec:#7A8694; --line:#D6DCE3;
  --alt:#E8ECF2; --white:#fff;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:#1a2a3a;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:32px 16px 60px;}
.wrap{width:100%;max-width:500px;}
h1{color:var(--gold);font-size:18px;font-weight:700;letter-spacing:1px;margin-bottom:3px;}
.sub{color:#5a7a9a;font-size:11px;margin-bottom:26px;}
.fsec{margin-bottom:20px;}
.fsec-title{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--gold);text-transform:uppercase;border-bottom:1px solid #2a3f55;padding-bottom:6px;margin-bottom:11px;}
.field{margin-bottom:10px;}
.field label{display:block;font-size:10px;color:#5a7a9a;margin-bottom:4px;font-weight:500;}
.field input{width:100%;background:#1a2d3f;border:1px solid #2a3f55;border-radius:6px;color:#e0eaf4;font-family:'Poppins',sans-serif;font-size:13px;padding:9px 12px;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--gold);}
.field input::placeholder{color:#3a5570;}
.frow{display:flex;gap:10px;} .frow .field{flex:1;}
.hint{font-size:9px;color:#4a6a85;margin-top:3px;font-style:italic;}
.btn{width:100%;background:var(--gold);color:var(--navy);font-family:'Poppins',sans-serif;font-size:14px;font-weight:700;border:none;border-radius:8px;padding:14px;cursor:pointer;letter-spacing:.5px;margin-top:6px;transition:opacity .2s;}
.btn:hover{opacity:.88;}
canvas{display:none;}
</style>
</head>
<body>
<div class="wrap">
  <h1>KREDİZMİR</h1>
  <p class="sub">Bilgileri girin → PNG olarak indirin</p>

  <div class="fsec">
    <div class="fsec-title">Müşteri Bilgileri</div>
    <div class="field"><label>Müşteri Adı Soyadı</label><input id="f_ad" type="text" placeholder="Ad Soyad"></div>
    <div class="field"><label>TC Kimlik No</label><input id="f_tc" type="text" placeholder="_ _ _ _ _ _ _ _ _ _ _"></div>
    <div class="field"><label>Başvuru Tarihi</label><input id="f_tarih" type="text" placeholder="GG / AA / YYYY"></div>
  </div>

  <div class="fsec">
    <div class="fsec-title">Finansman Özeti</div>
    <div class="field"><label>Kredi Tutarı (TL)</label><input id="f_kredi" type="text" placeholder="595.000"></div>
    <div class="field"><label>Net Ele Geçen (TL)</label><input id="f_net" type="text" placeholder="540.000"></div>
    <div class="field"><label>Tahmini Toplam Gider (TL)</label><input id="f_gider" type="text" placeholder="55.632"></div>
  </div>

  <div class="fsec">
    <div class="fsec-title">Aktif Bank Kalemi</div>
    <div class="field">
      <label>Kalem Adı (boş bırakırsan sabit kalır)</label>
      <input id="f_aktif_ad" type="text" placeholder="Aktif Bank dosya ve ekran kullanım bedeli">
    </div>
    <div class="field"><label>Tutar (TL)</label><input id="f_aktif_tutar" type="text" placeholder="23.382"></div>
  </div>

<button class="btn" onclick="olustur()">📥 PNG Olarak İndir</button>
<canvas id="cv"></canvas>

</div>

<script>
// ── helpers ──────────────────────────────────────────────────────────────────
function val(id){ return document.getElementById(id).value.trim(); }
function tl(v,fb){ if(!v) return fb||'—'; return v.includes('TL')?v:v+' TL'; }

// Draw rounded rect
function rr(ctx,x,y,w,h,r,fill,stroke){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
  if(fill){ctx.fillStyle=fill;ctx.fill();}
  if(stroke){ctx.strokeStyle=stroke.c;ctx.lineWidth=stroke.w||1;ctx.stroke();}
}

// Wrap text
function wrapText(ctx,text,maxW){
  const words=text.split(' '), lines=[];
  let cur='';
  for(const w of words){
    const t=cur?cur+' '+w:w;
    if(ctx.measureText(t).width<=maxW){cur=t;}
    else{if(cur)lines.push(cur);cur=w;}
  }
  if(cur)lines.push(cur);
  return lines;
}

function olustur(){
  const SCALE=3; // yüksek kalite
  const W=620, H=1180;
  const cv=document.getElementById('cv');
  cv.width=W*SCALE; cv.height=H*SCALE;
  const ctx=cv.getContext('2d');
  ctx.scale(SCALE,SCALE);

  const NAVY='#08264A', GOLD='#C8A23A', BG='#F3F4F6',
        TEXT='#233142', SEC='#7A8694', LINE='#D6DCE3',
        ALT='#E8ECF2', WHITE='#fff', NAVY2='#1A4A7A';

  // ── background ──
  ctx.fillStyle=WHITE; ctx.fillRect(0,0,W,H);

  // ── watermark ──
  ctx.save();
  ctx.globalAlpha=0.18;
  ctx.fillStyle=NAVY;
  ctx.font='bold 200px Poppins,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('OKİ', W/2, H/2+40);
  ctx.restore();

  // ── outer frame (navy) ──
  ctx.strokeStyle=NAVY; ctx.lineWidth=2.5;
  ctx.strokeRect(22,22,W-44,H-44);
  // inner frame (gold)
  ctx.strokeStyle=GOLD; ctx.lineWidth=1;
  ctx.strokeRect(28,28,W-56,H-56);
  // corner marks
  const cs=14, cm=22;
  ctx.strokeStyle=NAVY; ctx.lineWidth=2.5;
  [[cm,cm,1,0],[cm,cm,0,1],[W-cm,cm,-1,0],[W-cm,cm,0,1],
   [cm,H-cm,1,0],[cm,H-cm,0,-1],[W-cm,H-cm,-1,0],[W-cm,H-cm,0,-1]]
  .forEach(([x,y,dx,dy])=>{
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+dx*cs,y+dy*cs); ctx.stroke();
  });

  // ── header ──
  ctx.fillStyle=NAVY; ctx.fillRect(30,30,W-60,96);
  ctx.fillStyle=GOLD; ctx.fillRect(30,30+96-2,W-60,3);

  // brand
  ctx.fillStyle=WHITE; ctx.font='bold 28px Poppins,sans-serif';
  ctx.textAlign='left'; ctx.fillText('KREDİZMİR',48,30+48);
  ctx.fillStyle='#A8BCCF'; ctx.font='italic 11px Poppins,sans-serif';
  ctx.fillText('Rotanız mutluluk olsun.',48,30+65);

  // right title
  ctx.textAlign='right';
  ctx.fillStyle=WHITE; ctx.font='bold 15px Poppins,sans-serif';
  ctx.fillText('FİNANSAL ÇÖZÜM TEKLİFİ',W-48,30+44);
  ctx.fillStyle='#A8BCCF'; ctx.font='italic 10px Poppins,sans-serif';
  ctx.fillText('Ön Onay ve Bilgilendirme Formu',W-48,30+60);

  let y=30+96+6;
  ctx.textAlign='left';

  // ── section bar helper ──
  function secBar(label){
    ctx.fillStyle=NAVY; ctx.fillRect(30,y,W-60,24);
    ctx.fillStyle=NAVY2; ctx.fillRect(30,y,5,24);
    ctx.fillStyle=WHITE; ctx.font='bold 10px Poppins,sans-serif';
    ctx.fillText(label,42,y+16);
    y+=28;
  }

  // ── info field helper ──
  function infoField(label,value,x,fy,w){
    ctx.fillStyle=SEC; ctx.font='8px Poppins,sans-serif';
    ctx.fillText(label,x,fy+14);
    ctx.fillStyle=TEXT; ctx.font='600 11px Poppins,sans-serif';
    ctx.fillText(value,x,fy+28);
    ctx.strokeStyle=LINE; ctx.lineWidth=0.7;
    ctx.beginPath(); ctx.moveTo(x,fy+32); ctx.lineTo(x+w,fy+32); ctx.stroke();
  }

  // ── 1. MÜŞTERİ ──────────────────────────────────────────────────────────
  secBar('MÜŞTERİ VE ARAÇ BİLGİLERİ');
  const cx=40, iw=W-80, cw=(iw-16)/2;

  infoField('Müşteri Adı Soyadı', val('f_ad')||'—',        cx,     y, cw);
  infoField('TC Kimlik No',       val('f_tc')||'_ _ _ _ _ _ _ _ _ _ _', cx+cw+16, y, cw);
  y+=50;
  infoField('Araç Markası / Modeli','…………………………………',           cx,     y, cw);
  infoField('Model Yılı / Plaka',   '………… / …………',             cx+cw+16, y, cw);
  y+=50;
  infoField('Finansman Sağlayıcı','KREDİZMİR Vadelendirilen',cx,    y, cw);
  infoField('Başvuru Tarihi',      val('f_tarih')||'—',     cx+cw+16,y, cw);
  y+=56;

  // ── 2. FİNANSMAN ────────────────────────────────────────────────────────
  secBar('FİNANSMAN ÖZETİ');
  const boxes=[
    ['Kredi Tutarı','Onaylanan finansman', tl(val('f_kredi')), false],
    ['Net Ele Geçen','Müşteriye kalan net tutar', tl(val('f_net')), false],
    ['Tahmini Toplam Gider','Masraf ve kesintiler dahil', tl(val('f_gider')), false],
    ['Vade','Ay','........', false],
    ['Faiz Oranı','Aylık','% ......', true],
  ];
  const bw=(iw-20)/5, bh=66;
  boxes.forEach(([t,s,v,hi],i)=>{
    const bx=cx+i*(bw+5), by=y;
    if(hi){
      rr(ctx,bx,by,bw,bh,6,NAVY,{c:GOLD,w:1.2});
      ctx.fillStyle='#A8BCCF';
    } else {
      rr(ctx,bx,by,bw,bh,6,BG,{c:LINE,w:0.7});
      ctx.fillStyle=SEC;
    }
    ctx.font='500 8px Poppins,sans-serif';
    ctx.textAlign='center';
    ctx.fillText(t,bx+bw/2,by+17);
    ctx.fillStyle=hi?'#7A9AB8':SEC;
    ctx.font='7px Poppins,sans-serif';
    ctx.fillText(s,bx+bw/2,by+28);
    ctx.fillStyle=hi?WHITE:NAVY;
    ctx.font='bold 13px Poppins,sans-serif';
    ctx.fillText(v,bx+bw/2,by+52);
    ctx.textAlign='left';
  });
  y+=bh+18;

  // ── 3. GİDER KALEMLERİ ──────────────────────────────────────────────────
  secBar('KESİNTİ VE GİDER KALEMLERİ');

  const aktifAd    = val('f_aktif_ad')    || 'Aktif Bank dosya ve ekran kullanım bedeli';
  const aktifTutar = tl(val('f_aktif_tutar'),'23.382 TL');

  const items=[
    ['Taşıt rehin tesis bedeli','Araç üzerine rehin konulması işlemi','6.250 TL'],
    ['Taşıt rehin fek bedeli','Kredi bitiminde rehin kaldırma işlemi','6.000 TL'],
    ['Dosya masrafı / yol / üst alım','Sözleşme ve işlem giderleri','3.000 TL'],
    ['Kredi Koordinasyon & Süreç Yönetimi','Başvuru ve onay süreci yönetim hizmeti.','4.000 TL'],
    ['Banka Entegrasyon / Limit Açma','Özel limit oluşturma ve hızlı onay hizmeti.','3.000 TL'],
    ['Finansal Koruma Paketi','Krediye yönelik finansal güvence hizmeti.','4.000 TL'],
    ['Zorunlu vergi ve fon kesintileri','BSMV, KKDF ve yasal yükümlülükler','6.000 TL'],
    [aktifAd,'Banka sistem ve işlem gideri',aktifTutar],
  ];
  const rh=30;
  items.forEach(([name,detail,amt],i)=>{
    ctx.fillStyle=i%2===1?ALT:WHITE;
    ctx.fillRect(30,y,W-60,rh);
    ctx.strokeStyle=LINE; ctx.lineWidth=0.4;
    ctx.strokeRect(30,y,W-60,rh);
    // dot
    ctx.fillStyle=NAVY; ctx.beginPath();
    ctx.arc(42,y+rh/2,3,0,Math.PI*2); ctx.fill();
    // name
    ctx.fillStyle=TEXT; ctx.font='600 9.5px Poppins,sans-serif';
    ctx.fillText(name,52,y+16);
    // detail
    ctx.fillStyle=SEC; ctx.font='8px Poppins,sans-serif';
    ctx.fillText(detail,52,y+27);
    // amount
    ctx.fillStyle=TEXT; ctx.font='bold 11px Poppins,sans-serif';
    ctx.textAlign='right'; ctx.fillText(amt,W-38,y+19);
    ctx.textAlign='left';
    y+=rh;
  });

  // total band
  ctx.fillStyle=NAVY; ctx.fillRect(30,y,W-60,28);
  ctx.fillStyle=WHITE; ctx.font='bold 11px Poppins,sans-serif';
  ctx.fillText('TOPLAM GİDER TUTARI',44,y+19);
  ctx.textAlign='right'; ctx.fillText(tl(val('f_gider'),'—'),W-38,y+19);
  ctx.textAlign='left';
  y+=38;

  // ── 4. ONAY VE İMZA ─────────────────────────────────────────────────────
  secBar('ONAY VE İMZA');
  const disc='İşbu belgede yer alan finansman tutarı, net ele geçen tutar, vade, oran ve gider kalemlerine ilişkin bilgilendirmeyi okuduğumu, anladığımı ve tarafıma sözlü/yazılı olarak açıklandığını kabul ederim. Kişisel verilerimin ilgili mevzuat kapsamında finansman sürecinin yürütülmesi amacıyla işlenmesine onay verdiğimi beyan ederim.';
  ctx.font='italic 9px Poppins,sans-serif';
  const dlines=wrapText(ctx,disc,iw-20);
  const dh=dlines.length*14+16;
  rr(ctx,cx,y,iw,dh,5,BG,{c:LINE,w:0.7});
  ctx.fillStyle=TEXT;
  dlines.forEach((ln,i)=>ctx.fillText(ln,cx+10,y+14+i*14));
  y+=dh+14;

  // sig lines
  const sw=(iw-24)/3;
  ['Ad Soyad','İmza','Tarih'].forEach((lbl,i)=>{
    const sx=cx+i*(sw+12);
    ctx.strokeStyle=NAVY; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(sx,y+16); ctx.lineTo(sx+sw,y+16); ctx.stroke();
    ctx.fillStyle=SEC; ctx.font='8px Poppins,sans-serif';
    ctx.fillText(lbl,sx,y+28);
  });
  y+=42;

  // ── 5. KORUYUCU HÜKÜMLER ────────────────────────────────────────────────
  secBar('BİLGİLENDİRME VE KORUYUCU HÜKÜMLER');
  const clauses=[
    '1. Bu belgede yer alan tutar, oran, masraf ve vade bilgileri ön değerlendirme niteliğinde olup; nihai onay ilgili banka veya finans kuruluşunun sistem, skor, ekspertiz ve evrak incelemesi sonucunda kesinleşir.',
    '2. KREDİZMİR, finansman sürecinde danışmanlık, bilgilendirme ve organizasyon desteği sunmakta olup; kredi tahsisi, nihai faiz oranı, kesin ödeme planı ve kullandırım şartları ilgili finans kuruluşunun onayına tabidir.',
    '3. Araç durumu, kasko değeri, ekspertiz sonucu, müşteri kredi profili, yasal kesintiler ve güncel finansman politikalarına bağlı olarak bu belgede yer alan verilerde değişiklik oluşabilir; KREDİZMİR bu değişikliklerden kaynaklı nihai kurum kararından sorumlu tutulamaz.',
  ];
  clauses.forEach(cl=>{
    const lines=wrapText(ctx,cl,iw-18);
    lines.forEach((ln,i)=>{
      if(i===0){
        ctx.fillStyle=NAVY; ctx.font='bold 9px Poppins,sans-serif';
        ctx.fillText(ln.slice(0,2),cx,y+11);
        ctx.fillStyle=TEXT; ctx.font='9px Poppins,sans-serif';
        ctx.fillText(ln.slice(2),cx+15,y+11);
      } else {
        ctx.fillStyle=TEXT; ctx.font='9px Poppins,sans-serif';
        ctx.fillText(ln,cx+15,y+11);
      }
      y+=13;
    });
    ctx.strokeStyle=LINE; ctx.lineWidth=0.4;
    ctx.beginPath(); ctx.moveTo(cx,y+4); ctx.lineTo(cx+iw,y+4); ctx.stroke();
    y+=12;
  });

  // ── footer ───────────────────────────────────────────────────────────────
  ctx.strokeStyle=NAVY; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(30,y+8); ctx.lineTo(W-30,y+8); ctx.stroke();
  ctx.fillStyle=SEC; ctx.font='italic 8px Poppins,sans-serif';
  ctx.textAlign='center';
  ctx.fillText('Bu belge müşteri bilgilendirme ve ön değerlendirme amacıyla düzenlenmiştir.',W/2,y+22);
  ctx.fillText('Kesin onay, ilgili kurum değerlendirmesi ve evrak incelemesi sonrası netleşir.',W/2,y+34);
  ctx.textAlign='left';

  // ── iOS uyumlu: img olarak göster, long-press ile kaydet ──────────────
  const dataUrl = cv.toDataURL('image/png');
  let overlay = document.getElementById('img-overlay');
  if(!overlay){
    overlay = document.createElement('div');
    overlay.id = 'img-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:20px 12px 50px;overflow-y:auto;-webkit-overflow-scrolling:touch;';
    document.body.appendChild(overlay);
  }
  overlay.innerHTML = `
    <div style="color:#C8A23A;font-family:Poppins,sans-serif;font-size:14px;font-weight:700;margin-bottom:6px;">✅ Belge hazır</div>
    <div style="color:#7A9AB8;font-family:Poppins,sans-serif;font-size:11px;margin-bottom:16px;text-align:center;line-height:1.7;">
      iPhone: Görsele <strong style="color:#fff;">uzun bas</strong> → "Fotoğrafa Kaydet"<br>
      Android / PC: Görsele sağ tıkla → "Resmi Kaydet"
    </div>
    <img src="${dataUrl}" style="width:100%;max-width:560px;border-radius:6px;box-shadow:0 8px 40px rgba(0,0,0,.6);display:block;" />
    <button onclick="document.getElementById('img-overlay').remove()"
      style="margin-top:20px;background:#08264A;color:#C8A23A;border:1px solid #C8A23A;border-radius:8px;padding:12px 36px;font-family:Poppins,sans-serif;font-size:13px;font-weight:700;cursor:pointer;-webkit-tap-highlight-color:transparent;">
      ✕ Kapat
    </button>
  `;
}
</script>

</body>
</html>
